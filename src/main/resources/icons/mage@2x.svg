<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Mage hammer icon (HiDPI) -->
  <!-- Hammer head -->
  <rect x="2" y="4" width="18" height="10" rx="2" fill="#E07B39"/>
  <!-- Hammer handle -->
  <rect x="14" y="12" width="5" height="16" rx="2" transform="rotate(-35 16 14)" fill="#8B6340"/>
  <!-- Strike lines (action indicator) -->
  <line x1="22" y1="2" x2="26" y2="6" stroke="#E07B39" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="8" x2="30" y2="8" stroke="#E07B39" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="14" x2="26" y2="10" stroke="#E07B39" stroke-width="3" stroke-linecap="round"/>
</svg>
